name: Build ImageHub

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      # Séquentiel : évite que les deux runners créent/mettent à jour la
      # release et latest.json en même temps (collision observée en parallèle).
      max-parallel: 1
      matrix:
        platform: [ubuntu-24.04, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Dépendances système (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Moteurs embarqués dans l'installeur Windows (ffmpeg, Real-ESRGAN, vtracer).
      # magick/inkscape/rembg ne sont pas bundlés : les actions correspondantes
      # s'affichent « indispo » tant qu'ils ne sont pas installés sur la machine.
      - name: Sidecars Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force src-tauri/binaries | Out-Null

          Write-Host "--- ffmpeg ---"
          Invoke-WebRequest https://github.com/BtbN/FFmpeg-Builds/releases/latest/download/ffmpeg-master-latest-win64-gpl.zip -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-tmp
          Copy-Item ffmpeg-tmp/*/bin/ffmpeg.exe src-tauri/binaries/

          Write-Host "--- Real-ESRGAN (binaire + modèles) ---"
          Invoke-WebRequest https://github.com/xinntao/Real-ESRGAN/releases/download/v0.2.5.0/realesrgan-ncnn-vulkan-20220424-windows.zip -OutFile esrgan.zip
          Expand-Archive esrgan.zip -DestinationPath esrgan-tmp
          Copy-Item esrgan-tmp/realesrgan-ncnn-vulkan.exe src-tauri/binaries/
          Copy-Item esrgan-tmp/*.dll src-tauri/binaries/ -ErrorAction SilentlyContinue
          Copy-Item -Recurse esrgan-tmp/models src-tauri/binaries/models

          Write-Host "--- vtracer (best effort) ---"
          try {
            gh release download --repo visioncortex/vtracer --pattern "*x86_64*windows*" --dir vtracer-dl
            $archive = Get-ChildItem vtracer-dl | Select-Object -First 1
            if ($archive) {
              New-Item -ItemType Directory -Force vtracer-tmp | Out-Null
              if ($archive.Extension -eq ".zip") { Expand-Archive $archive.FullName -DestinationPath vtracer-tmp }
              else { tar -xf $archive.FullName -C vtracer-tmp }
              $exe = Get-ChildItem -Recurse vtracer-tmp -Filter vtracer.exe | Select-Object -First 1
              if ($exe) { Copy-Item $exe.FullName src-tauri/binaries/ }
            }
          } catch { Write-Host "vtracer non bundlé : $_" }
          $global:LASTEXITCODE = 0

          Get-ChildItem -Recurse src-tauri/binaries | Select-Object FullName

      - run: npm ci

      # Build + signature des artefacts updater + (sur tag) release GitHub.
      # tauri-action agrège latest.json sur la release depuis les deux runners
      # de la matrice (Linux AppImage + Windows NSIS), avec leurs signatures.
      - name: Build + Release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Clé privée de signature des mises à jour (jamais dans le dépôt).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Vide hors tag (workflow_dispatch) → build seul, sans release.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ImageHub ${{ github.ref_name }}
          releaseDraft: true
          includeUpdaterJson: true

      # Récupère aussi les bundles classiques (.deb/.rpm) en artefacts de run,
      # utile pour les builds manuels (workflow_dispatch, sans release).
      - name: Artefacts
        uses: actions/upload-artifact@v4
        with:
          name: imagehub-${{ runner.os }}
          if-no-files-found: ignore
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/nsis/*.exe
